<!-- FILE: resources/views/jobs.html -->

<div class="flex flex-wrap items-end justify-between gap-4">
  <div>
    <span class="inline-flex items-center gap-2 text-[11px] font-semibold uppercase tracking-wider px-2 py-1 rounded bg-slp-primary/10 text-slp-primary">
      <i data-lucide="briefcase" class="h-3.5 w-3.5"></i> Careers
    </span>
    <h1 class="mt-3 text-2xl md:text-3xl font-semibold">Jobs</h1>
    <p class="mt-1 text-sm text-zinc-600">Explore current opportunities.</p>
  </div>
</div>

<form method="get" class="mt-6 flex flex-wrap gap-3 items-end bg-white rounded-2xl ring-1 ring-gray-200 p-4">
  <label class="text-sm text-zinc-600">
    Search
    <input class="mt-1 w-72 max-w-full rounded-xl border px-3 py-2 bg-white" type="text" name="q" value="{{q}}" placeholder="Search jobs..." />
  </label>

  <label class="text-sm text-zinc-600">
    Per page
    <input class="mt-1 w-24 rounded-xl border px-3 py-2 bg-white" type="text" name="per_page" value="{{per_page}}" />
  </label>

  <label class="text-sm text-zinc-600">
    Tenant
    <input class="mt-1 w-24 rounded-xl border px-3 py-2 bg-white" type="text" name="tenant_id" value="{{tenant_id}}" />
  </label>

  <button class="rounded-xl bg-slp-primary text-white px-4 py-2 hover:opacity-90" type="submit">
    Refresh
  </button>
</form>

{{#error}}
  <div class="mt-6 rounded-2xl border border-red-200 bg-red-50 p-4 text-red-800">
    {{error}}
  </div>
{{/error}}

<div class="mt-8 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
  {{#items}}
  <article class="bg-white rounded-2xl shadow-sm ring-1 ring-gray-100 hover:shadow-md hover:ring-gray-200 transition overflow-hidden">
    <a href="{{href}}" class="block p-5">
      <div class="flex items-start gap-3">
        <span class="mt-0.5 inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-slp-primary/10 text-slp-primary ring-1 ring-slp-primary/20">
          <i data-lucide="briefcase" class="h-5 w-5"></i>
        </span>

        <div class="min-w-0">
          <h3 class="font-semibold leading-snug text-lg line-clamp-2">{{title}}</h3>

          <div class="mt-2 flex flex-wrap items-center gap-2 text-xs">
            {{#has_department}}
              <span class="px-2 py-1 rounded-full bg-zinc-100 text-zinc-700">{{department}}</span>
            {{/has_department}}

            {{#has_deadline}}
              <span class="px-2 py-1 rounded-full bg-amber-50 text-amber-800 ring-1 ring-amber-100">
                Closing: {{deadline}}
              </span>
            {{/has_deadline}}
          </div>

          <div class="mt-4 inline-flex items-center text-slp-primary text-sm font-medium">
            View details →
          </div>
        </div>
      </div>
    </a>
  </article>
  {{/items}}

  {{^items}}
    <div class="text-zinc-500">No jobs returned.</div>
  {{/items}}
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) window.lucide.createIcons();
  });
</script>
