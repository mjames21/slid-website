<div class="flex items-end justify-between gap-4 flex-wrap">
  <div>
    <h1 class="text-2xl md:text-3xl font-semibold">{{page_title}}</h1>
    <p class="mt-1 text-sm text-zinc-600">Static data (VM). Adjust the ViewModel in the controller.</p>
  </div>
</div>

<form method="get" class="mt-5 flex flex-wrap gap-3 items-end">
  <label class="text-sm text-zinc-600">
    Search
    <input class="mt-1 w-64 max-w-full rounded-xl border px-3 py-2 bg-white" type="text" name="q" value="{{q}}" placeholder="Search..." />
  </label>

  <label class="text-sm text-zinc-600">
    Per page
    <input class="mt-1 w-24 rounded-xl border px-3 py-2 bg-white" type="text" name="per_page" value="{{per_page}}" />
  </label>

  <label class="text-sm text-zinc-600">
    Tenant
    <input class="mt-1 w-24 rounded-xl border px-3 py-2 bg-white" type="text" name="tenant_id" value="{{tenant_id}}" />
  </label>

  <button class="rounded-xl bg-slp-primary text-white px-4 py-2 hover:opacity-90" type="submit">Refresh</button>
</form>

{{#error}}
  <p class="mt-4 text-sm text-red-700">Error: {{error}}</p>
{{/error}}

<div class="mt-7 grid gap-4">
  {{#items}}
    <div class="rounded-2xl border bg-white p-5">
      <h3 class="font-semibold text-lg">{{title}}</h3>
      <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 text-sm">
        {{#pairs}}
          <div class="text-zinc-500">{{key}}</div>
          <div class="break-words">{{value}}</div>
        {{/pairs}}
      </div>
    </div>
  {{/items}}

  {{^items}}
    <p class="text-zinc-500">No items returned.</p>
  {{/items}}
</div>

{{#json_pretty}}
  <h3 class="mt-10 font-semibold">Debug JSON</h3>
  <pre class="mt-2 rounded-2xl border bg-white p-4 text-xs overflow-auto">{{json_pretty}}</pre>
{{/json_pretty}}
