<!-- FILE: resources/views/events.html -->

<section class="mt-6 sm:mt-8 md:mt-10">
  <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5 md:gap-6">
    <div>
      <span class="inline-flex items-center gap-2 text-[11px] font-extrabold uppercase tracking-wider px-2 py-1 rounded bg-[#05331F]/10 text-[#05331F]">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M5 11h14M6 21h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/>
        </svg>
        Events
      </span>
      <h1 class="mt-3 text-2xl sm:text-3xl font-semibold text-[#05331F]">{{page_title}}</h1>
      <p class="mt-1 text-sm text-zinc-600 leading-6">Upcoming events and official engagements.</p>
    </div>
  </div>

  {{#error}}
    <div class="mt-6 rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-800">
      {{error}}
    </div>
  {{/error}}

  {{#has_items}}
    <div class="mt-6 sm:mt-8 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6">
      {{#items}}
        <article class="bg-white rounded-2xl shadow-sm ring-1 ring-gray-100 hover:shadow-md hover:ring-gray-200 transition overflow-hidden">
          <div class="p-4 sm:p-5">
            <h3 class="font-semibold leading-snug text-[#05331F]">
              <a class="hover:underline" href="{{href}}">{{title}}</a>
            </h3>

            <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-zinc-600">
              <span class="inline-flex items-center gap-1">
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M5 11h14M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/>
                </svg>
                {{date}}
              </span>
              {{#location}}
                <span class="h-1 w-1 rounded-full bg-zinc-300"></span>
                <span class="inline-flex items-center gap-1">
                  <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5 9 6.343 9 8s1.343 3 3 3z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.5 8c0 7-7.5 13-7.5 13S4.5 15 4.5 8a7.5 7.5 0 1 1 15 0z"/>
                  </svg>
                  {{location}}
                </span>
              {{/location}}
            </div>

            <p class="mt-3 text-sm text-zinc-700 leading-6">{{excerpt}}</p>

            <div class="mt-4">
              <a class="inline-flex items-center gap-2 text-sm font-semibold text-[#05331F] hover:underline" href="{{href}}">
                View details
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </a>
            </div>
          </div>
        </article>
      {{/items}}
    </div>
  {{/has_items}}

  {{^has_items}}
    <div class="mt-8 sm:mt-10 rounded-2xl border border-zinc-200 bg-white p-6 text-zinc-700">
      No events found.
    </div>
  {{/has_items}}
</section>
